<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Dashboard — RentLux</title>
  <meta name="description" content="Search properties, submit applications, and track your rental status on RentLux.">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    .apply-form .form-group { margin-bottom: 1rem; }
    .agreement-box {
      background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius-md); padding: 1.25rem; margin-top: 1rem;
    }
    .agreement-text {
      font-family: 'Courier New', monospace; font-size: 0.78rem;
      color: var(--text-secondary); white-space: pre-wrap;
      max-height: 300px; overflow-y: auto; padding: 1rem;
      background: rgba(0,0,0,0.25); border-radius: var(--radius-sm);
      border: 1px solid var(--border); margin: 0.75rem 0;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="nav-brand" href="/">Rent<span>Lux</span></a>
  <div class="nav-links" id="nav-user-info"></div>
</nav>

<!-- Main Page -->
<div class="page">
  <div class="page-header">
    <h1 class="page-title" id="welcome-title">Tenant Dashboard</h1>
    <p class="page-subtitle">Search properties, apply, and track your rental journey</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-search"       onclick="switchTab('tab-search')">🔍 Search Properties</button>
    <button class="tab-btn"        data-tab="tab-applications" onclick="switchTab('tab-applications')">📋 My Applications</button>
    <button class="tab-btn"        data-tab="tab-agreements"   onclick="switchTab('tab-agreements')">📜 Agreements</button>
  </div>

  <!-- ─── TAB: Search Properties ─── -->
  <div id="tab-search" class="tab-pane active">
    <!-- Search Bar -->
    <div class="search-bar">
      <input id="search-q" class="search-input" placeholder="Search by location, name, or type…" oninput="debounceSearch()">
      <select id="filter-city" class="form-control search-filter" onchange="loadProperties()">
        <option value="">All Cities</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Vijayawada">Vijayawada</option>
      </select>
      <select id="filter-bhk" class="form-control search-filter" onchange="loadProperties()">
        <option value="">Any BHK</option>
        <option value="1">1 BHK</option>
        <option value="2">2 BHK</option>
        <option value="3">3 BHK</option>
        <option value="4">4 BHK</option>
      </select>
      <select id="filter-type" class="form-control search-filter" onchange="loadProperties()">
        <option value="">Any Type</option>
        <option value="Apartment">Apartment</option>
        <option value="Villa">Villa</option>
        <option value="House">House</option>
        <option value="Plot">Plot</option>
      </select>
      <input id="filter-min" class="form-control search-filter" type="number" placeholder="Min ₹" oninput="debounceSearch()">
      <input id="filter-max" class="form-control search-filter" type="number" placeholder="Max ₹" oninput="debounceSearch()">
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
    </div>

    <!-- Results info -->
    <div id="search-meta" style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:1rem;"></div>

    <!-- Property Grid -->
    <div id="property-grid" class="grid-4">
      <div class="loading-overlay"><div class="spinner"></div>Loading properties…</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" style="display:flex;gap:0.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;"></div>
  </div>

  <!-- ─── TAB: My Applications ─── -->
  <div id="tab-applications" class="tab-pane">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <h2 style="font-size:1.1rem;font-weight:600;">My Rental Applications</h2>
      <button class="btn btn-ghost btn-sm" onclick="loadApplications()">↻ Refresh</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Property</th><th>City</th><th>Rent</th>
              <th>Applied</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="app-tbody">
            <tr><td colspan="6" class="loading-overlay"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ─── TAB: Agreements ─── -->
  <div id="tab-agreements" class="tab-pane">
    <div style="margin-bottom:1.25rem;">
      <h2 style="font-size:1.1rem;font-weight:600;">Rental Agreements</h2>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.25rem;">
        Agreements are available for accepted applications. Both parties must sign.
      </p>
    </div>
    <div id="agreements-container">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  // ── Auth guard
  const currentUser = requireAuth(['tenant']);
  if (currentUser) {
    document.getElementById('welcome-title').textContent = `Welcome back, ${currentUser.name} 👋`;
    renderNav(currentUser);
  }

  let currentPage = 1;
  let searchTimer = null;

  // ── Property Search ───────────────────────────
  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadProperties(), 400);
  }

  function clearFilters() {
    ['search-q','filter-city','filter-bhk','filter-type','filter-min','filter-max'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
    });
    currentPage = 1;
    loadProperties();
  }

  async function loadProperties(page = 1) {
    currentPage = page;
    const grid = document.getElementById('property-grid');
    grid.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>Loading…</div>';

    const params = {
      page, limit: 12,
      search  : document.getElementById('search-q').value.trim(),
      city    : document.getElementById('filter-city').value,
      bhk     : document.getElementById('filter-bhk').value,
      type    : document.getElementById('filter-type').value,
      minPrice: document.getElementById('filter-min').value,
      maxPrice: document.getElementById('filter-max').value,
    };
    Object.keys(params).forEach(k => { if (!params[k] && params[k] !== 0) delete params[k]; });

    try {
      const res = await propertyAPI.getAll(params);
      renderProperties(res.data || []);
      renderPagination(res.totalPages || 1, page);
      document.getElementById('search-meta').textContent =
        `${res.total || 0} properties found`;
    } catch (err) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>${err.message}</p></div>`;
    }
  }

  function renderProperties(props) {
    const grid = document.getElementById('property-grid');
    if (!props.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🏠</div><h3>No properties found</h3>
        <p>Try adjusting your filters</p></div>`;
      return;
    }
    grid.innerHTML = props.map(p => `
      <div class="property-card">
        ${propImg(p.images, p.title)}
        <div class="property-body">
          <div class="property-price">${formatCurrency(p.price)}<span style="font-size:0.7rem;font-weight:400;color:var(--text-muted)">/mo</span></div>
          <div class="property-title">${p.title}</div>
          <div class="property-location">📍 ${p.location || p.city}</div>
          <div class="property-meta">
            ${p.bhk ? `<span class="property-tag">${p.bhk} BHK</span>` : ''}
            <span class="property-tag">${p.type}</span>
            <span class="property-tag">${p.city}</span>
          </div>
        </div>
        <div class="property-actions">
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="openApplyModal('${p.id}','${escStr(p.title)}','${formatCurrency(p.price)}')">Apply Now</button>
          <button class="btn btn-ghost btn-sm" onclick="viewDetails('${p.id}')">Details</button>
        </div>
      </div>`).join('');
  }

  function renderPagination(total, current) {
    const pg = document.getElementById('pagination');
    if (total <= 1) { pg.innerHTML = ''; return; }
    let html = '';
    if (current > 1)  html += `<button class="btn btn-ghost btn-sm" onclick="loadProperties(${current-1})">‹ Prev</button>`;
    for (let i = Math.max(1,current-2); i <= Math.min(total,current+2); i++) {
      html += `<button class="btn btn-sm ${i===current?'btn-primary':'btn-ghost'}" onclick="loadProperties(${i})">${i}</button>`;
    }
    if (current < total) html += `<button class="btn btn-ghost btn-sm" onclick="loadProperties(${current+1})">Next ›</button>`;
    pg.innerHTML = html;
  }

  // ── Apply Modal ───────────────────────────────
  function openApplyModal(propertyId, title, price) {
    showModal(`
      <div class="apply-form">
        <p style="margin-bottom:1rem;color:var(--text-secondary);font-size:0.875rem;">
          Applying for: <strong style="color:var(--text-primary)">${title}</strong> (${price}/mo)
        </p>
        <div class="form-group">
          <label class="form-label">Message to Owner (optional)</label>
          <textarea id="apply-msg" class="form-control" placeholder="Introduce yourself, mention move-in date, any questions…"></textarea>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:0.5rem;">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-gold" onclick="submitApplication('${propertyId}')">Submit Application</button>
        </div>
      </div>`, 'Apply for Property');
  }

  async function submitApplication(propertyId) {
    const msg = document.getElementById('apply-msg')?.value || '';
    try {
      await tenantAPI.apply(propertyId, msg);
      closeModal();
      showToast('✅ Application submitted successfully!');
      loadApplications();
    } catch (err) {
      showToast('❌ ' + err.message, 'error');
    }
  }

  function viewDetails(id) {
    showToast('Opening property details…', 'info');
    window.open(`/api/properties/${id}`, '_blank');
  }

  // ── Applications ──────────────────────────────
  async function loadApplications() {
    const tbody = document.getElementById('app-tbody');
    tbody.innerHTML = '<tr><td colspan="6" class="loading-overlay"><div class="spinner"></div></td></tr>';
    try {
      const res = await tenantAPI.myApps();
      renderApplicationsTable(res.data || []);
      loadAgreements(res.data || []);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger);padding:1rem">${err.message}</td></tr>`;
    }
  }

  function renderApplicationsTable(apps) {
    const tbody = document.getElementById('app-tbody');
    if (!apps.length) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state"><div class="empty-icon">📋</div><h3>No applications yet</h3>
        <p>Browse properties and hit "Apply Now" to get started</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = apps.map(a => `
      <tr>
        <td>
          <div style="font-weight:500">${a.property_title}</div>
          <div style="font-size:0.75rem;color:var(--text-secondary)">${a.city}</div>
        </td>
        <td>${a.city}</td>
        <td>${formatCurrency(a.price)}</td>
        <td>${formatDate(a.applied_at)}</td>
        <td>${statusBadge(a.status)}</td>
        <td>
          ${a.status === 'pending'
            ? `<button class="btn btn-danger btn-sm" onclick="withdrawApp('${a.id}')">Withdraw</button>`
            : a.status === 'accepted'
              ? `<button class="btn btn-success btn-sm" onclick="switchTab('tab-agreements')">View Agreement</button>`
              : '<span style="color:var(--text-muted);font-size:0.8rem">—</span>'}
        </td>
      </tr>`).join('');
  }

  async function withdrawApp(id) {
    if (!confirm('Withdraw this application?')) return;
    try {
      await tenantAPI.withdraw(id);
      showToast('Application withdrawn');
      loadApplications();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  // ── Agreements ────────────────────────────────
  async function loadAgreements(apps) {
    const container = document.getElementById('agreements-container');
    const accepted  = (apps || []).filter(a => a.status === 'accepted');

    if (!accepted.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📜</div>
        <h3>No agreements yet</h3><p>Agreements appear here once an owner accepts your application.</p></div>`;
      return;
    }

    container.innerHTML = '';
    for (const app of accepted) {
      const card = document.createElement('div');
      card.className = 'card'; card.style.marginBottom = '1.25rem';
      card.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
          <div>
            <div style="font-weight:600">${app.property_title}</div>
            <div style="font-size:0.8rem;color:var(--text-secondary)">${app.city} · ${formatCurrency(app.price)}/mo</div>
          </div>
          ${statusBadge(app.status)}
        </div>
        <div id="agr-${app.id}">
          <button class="btn btn-gold btn-sm" onclick="loadOrGenerateAgreement('${app.id}', '${app.agreement_id || ''}')">
            ${app.agreement_id ? '📜 View Agreement' : '✨ Generate AI Agreement'}
          </button>
        </div>`;
      container.appendChild(card);
    }
  }

  async function loadOrGenerateAgreement(appId, existingAgrId) {
    const container = document.getElementById('agr-' + appId);
    container.innerHTML = '<div class="spinner" style="margin:0.5rem 0"></div>';
    try {
      let agr;
      if (existingAgrId) {
        const res = await agreementAPI.get(appId);
        agr = res.data;
      } else {
        const res = await agreementAPI.generate(appId);
        agr = res.data;
      }
      container.innerHTML = `
        <div class="agreement-box">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
            <strong>📝 Rental Agreement</strong>
            <div style="display:flex;gap:0.5rem;">
              ${agr.signed_tenant ? '<span class="badge badge-success">✅ Tenant Signed</span>' : `<button class="btn btn-success btn-sm" onclick="signAgreement('${agr.id}','${appId}')">Sign as Tenant</button>`}
              ${agr.signed_owner  ? '<span class="badge badge-success">✅ Owner Signed</span>'  : '<span class="badge badge-muted">⏳ Owner Pending</span>'}
            </div>
          </div>
          <div class="agreement-text">${escHtml(agr.terms)}</div>
          <button class="btn btn-ghost btn-sm" onclick="printAgreement('${appId}')">🖨 Print / Save</button>
        </div>`;
    } catch (err) {
      container.innerHTML = `<span style="color:var(--danger);font-size:0.85rem">${err.message}</span>`;
    }
  }

  async function signAgreement(agrId, appId) {
    try {
      await agreementAPI.sign(agrId);
      showToast('✅ Agreement signed!');
      loadApplications();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function printAgreement(appId) {
    const el = document.querySelector(`#agr-${appId} .agreement-text`);
    if (!el) return;
    const win = window.open('', '_blank');
    win.document.write(`<pre style="font-family:monospace;padding:2rem;">${el.textContent}</pre>`);
    win.print();
  }

  function escStr(s) { return s.replace(/'/g,"&#39;"); }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ── Init
  loadProperties();
  loadApplications();
</script>
<script src="/js/chatbot.js"></script>
</body>
</html>
